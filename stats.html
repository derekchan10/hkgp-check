<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港股中签率统计</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/style.css?v=202605011354">
</head>
<body>
    <div class="container mt-5">
        <div>
            <a href="index.html" class="nav-link-top">← 返回比对工具</a>
        </div>
        <h1 class="text-center mb-4">港股中签率统计</h1>

        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="resultFile" class="form-label">中签结果文件（Excel格式，四列：账号后三位、名字头5个字母、投注数、中签数）</label>
                            <input type="file" class="form-control" id="resultFile" accept=".xlsx,.xls">
                            <div class="form-text">文件名包含港股代码（4-5位数字）。例：<code>2557.xlsx</code> 或 <code>02557_天星医疗.xlsx</code>。</div>
                        </div>
                        <div id="statusMsg" class="alert alert-info" style="display:none;"></div>
                        <div id="errorMsg" class="alert alert-danger" style="display:none;"></div>
                    </div>
                </div>

                <div id="resultCard" class="card mt-4" style="display:none;">
                    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <h5 class="mb-0">统计结果</h5>
                        <div>
                            <button id="downloadImgBtn" class="btn btn-success btn-sm">保存图片</button>
                            <button id="resetBtn" class="btn btn-outline-secondary btn-sm">重置</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
                            <label for="issuePrice" class="form-label mb-0" style="white-space:nowrap;">发行价 (HKD)：</label>
                            <input type="number" step="0.001" min="0" class="form-control form-control-sm" id="issuePrice" style="max-width:120px;font-size:16px;" placeholder="可选">
                            <span class="text-muted" style="font-size:12px;">填入后自动区分甲组/乙组（甲组上限 500 万）</span>
                        </div>
                        <div id="exportArea">
                            <div class="stats-title" id="statsTitle"></div>
                            <table>
                                <thead id="statsThead">
                                    <tr>
                                        <th>投注数</th>
                                        <th>申购账户数</th>
                                        <th>中签账户数</th>
                                        <th>综合中签率</th>
                                    </tr>
                                </thead>
                                <tbody id="statsTbody"></tbody>
                            </table>
                            <div class="stats-note" id="statsNote" style="display:none;"></div>
                            <div class="stats-summary" id="statsSummary"></div>
                            <div class="stats-time" id="statsTime"></div>
                        </div>
                        <div class="img-preview" id="imgPreview" style="display:none;">
                            <div class="img-preview-tip">📱 长按下方图片可"存储到照片"</div>
                            <img id="imgPreviewImg" src="" alt="中签率统计图">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 浮动广告 -->
    <div id="floatAd" class="float-ad">
        <div class="float-ad-desktop">
            <div class="float-ad-title-row">
                <span class="float-ad-title">📢 账号托管</span>
                <button class="float-ad-close" onclick="document.getElementById('floatAd').style.display='none'">×</button>
            </div>
            <div style="margin-bottom:4px;">微信：<strong>DC101000</strong></div>
            <button class="copy-btn" onclick="copyWechat()">复制微信号</button>
            <div class="float-ad-sub">加微信请备注来源</div>
            <img src="static/wechat-qr.jpg" alt="微信二维码" style="width:100%;border-radius:6px;margin:6px 0;">
            <hr class="float-ad-hr">
            <div class="float-ad-list">✅ 高胜率认购策略<br>✅ 自动化认购<br>✅ 中签查询<br>✅ 一键卖出</div>
        </div>
        <div class="float-ad-mobile">
            <div class="float-ad-mobile-header">
                <span>📢 账号托管 · 微信：<strong>DC101000</strong>（备注来源）</span>
                <div style="display:flex;gap:6px;flex-shrink:0;align-items:center;">
                    <button class="copy-btn copy-btn-sm" onclick="copyWechat()">复制微信号</button>
                    <button class="float-ad-close float-ad-close-inline" onclick="document.getElementById('floatAd').style.display='none'">×</button>
                </div>
            </div>
            <div class="float-ad-mobile-body">
                <div class="float-ad-list">✅ 高胜率认购策略 &nbsp;✅ 自动化认购 &nbsp;✅ 中签查询 &nbsp;✅ 一键卖出</div>
            </div>
        </div>
    </div>

    <script>
        function copyWechat() {
            navigator.clipboard.writeText('DC101000').then(function() {
                document.querySelectorAll('.copy-btn').forEach(function(btn) { btn.textContent = '已复制✓'; });
                setTimeout(function() {
                    document.querySelectorAll('.copy-btn').forEach(function(btn) { btn.textContent = '复制微信号'; });
                }, 2000);
            });
        }
    </script>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <script>
    (function() {
        const fileInput = document.getElementById('resultFile');
        const statusMsg = document.getElementById('statusMsg');
        const errorMsg = document.getElementById('errorMsg');
        const resultCard = document.getElementById('resultCard');
        const statsTitle = document.getElementById('statsTitle');
        const statsTbody = document.getElementById('statsTbody');
        const statsSummary = document.getElementById('statsSummary');
        const statsTime = document.getElementById('statsTime');
        const downloadImgBtn = document.getElementById('downloadImgBtn');
        const resetBtn = document.getElementById('resetBtn');

        const nameCache = new Map();
        let currentStats = null;

        function setStatus(msg) {
            errorMsg.style.display = 'none';
            if (msg) {
                statusMsg.textContent = msg;
                statusMsg.style.display = 'block';
            } else {
                statusMsg.style.display = 'none';
            }
        }
        function setError(msg) {
            statusMsg.style.display = 'none';
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        // 文件名 → 港股代码（5位字符串，左补0）
        function parseCode(filename) {
            const base = filename.replace(/\.(xlsx|xls)$/i, '');
            let m;
            try {
                m = base.match(/(?<!\d)(\d{4,5})(?!\d)/);
            } catch (e) {
                m = null;
            }
            if (!m) m = base.match(/\b(\d{4,5})\b/);
            if (!m) m = base.match(/(\d{4,5})/);
            if (!m) return null;
            return m[1].padStart(5, '0');
        }

        function fetchWithTimeout(url, opts, ms) {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), ms || 5000);
            return fetch(url, Object.assign({ signal: ctrl.signal }, opts || {}))
                .finally(() => clearTimeout(timer));
        }

        // 解析腾讯返回的 GBK 字节，提取股票名（第二个字段）
        async function parseTencent(arrayBuffer) {
            let text;
            try {
                text = new TextDecoder('gbk').decode(arrayBuffer);
            } catch (e) {
                text = new TextDecoder('utf-8').decode(arrayBuffer);
            }
            const m = text.match(/="([^"]+)"/);
            if (!m) return null;
            const fields = m[1].split('~');
            const name = (fields[1] || '').trim();
            return name || null;
        }

        async function tryTencent(code) {
            const url = `https://qt.gtimg.cn/q=hk${code}`;
            const resp = await fetchWithTimeout(url, {}, 5000);
            if (!resp.ok) throw new Error('腾讯接口失败');
            const buf = await resp.arrayBuffer();
            return await parseTencent(buf);
        }

        async function tryAllOrigins(code) {
            const target = `https://qt.gtimg.cn/q=hk${code}`;
            const url = `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`;
            const resp = await fetchWithTimeout(url, {}, 8000);
            if (!resp.ok) throw new Error('代理接口失败');
            const buf = await resp.arrayBuffer();
            return await parseTencent(buf);
        }

        async function fetchStockName(code) {
            if (nameCache.has(code)) return nameCache.get(code);
            const sources = [
                () => tryTencent(code),
                () => tryAllOrigins(code)
            ];
            for (const fn of sources) {
                try {
                    const name = await fn();
                    if (name) {
                        nameCache.set(code, name);
                        return name;
                    }
                } catch (e) {
                    // 继续下一源
                }
            }
            return null;
        }

        function readExcelFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        resolve(XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' }));
                    } catch (err) {
                        reject(new Error('读取文件失败：' + err.message));
                    }
                };
                reader.onerror = () => reject(new Error('文件读取出错'));
                reader.readAsArrayBuffer(file);
            });
        }

        function computeTierStats(rows) {
            // 跳过表头：列0=账号后3位 列1=名字 列2=投注数 列3=中签数
            const tierMap = new Map();
            let totalAccounts = 0, totalWins = 0;
            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                const buyRaw = r[2];
                if (buyRaw === '' || buyRaw === undefined || buyRaw === null) continue;
                const buyCount = Number(buyRaw);
                if (!Number.isFinite(buyCount)) continue;
                const winCount = Number(r[3]) || 0;
                if (!tierMap.has(buyCount)) tierMap.set(buyCount, { total: 0, won: 0 });
                const t = tierMap.get(buyCount);
                t.total++;
                if (winCount >= 1) t.won++;
                totalAccounts++;
                if (winCount >= 1) totalWins++;
            }
            const tiers = Array.from(tierMap.entries())
                .sort((a, b) => a[0] - b[0])
                .map(([buyCount, v]) => ({
                    buyCount,
                    total: v.total,
                    won: v.won,
                    rate: v.total > 0 ? v.won / v.total : 0
                }));
            return { tiers, totalAccounts, totalWins };
        }

        function rateClass(rate) {
            const pct = rate * 100;
            if (pct < 1.5) return 'rate-r1';
            if (pct < 3) return 'rate-r2';
            if (pct < 10) return 'rate-r3';
            if (pct < 30) return 'rate-r4';
            return 'rate-r5';
        }

        function fmtNum(n) {
            return n.toLocaleString('en-US');
        }

        function render(stats, code, name, issuePrice) {
            statsTitle.textContent = `${name} (${code}) 中签率统计`;
            const showType = Number.isFinite(issuePrice) && issuePrice > 0;
            const thead = document.getElementById('statsThead');
            thead.innerHTML = showType
                ? '<tr><th>类型</th><th>投注数</th><th>申购账户数</th><th>中签账户数</th><th>综合中签率</th></tr>'
                : '<tr><th>投注数</th><th>申购账户数</th><th>中签账户数</th><th>综合中签率</th></tr>';
            statsTbody.innerHTML = '';
            let hasYi = false;
            for (const t of stats.tiers) {
                const tr = document.createElement('tr');
                const pct = (t.rate * 100).toFixed(2) + '%';
                let typeCell = '';
                if (showType) {
                    const amount = t.buyCount * issuePrice;
                    const isJia = amount <= 5_000_000;
                    if (!isJia) hasYi = true;
                    const label = isJia ? '甲组' : '乙组';
                    const cls = isJia ? 'type-jia' : 'type-yi';
                    typeCell = `<td class="${cls}">${label}</td>`;
                }
                tr.innerHTML = `
                    ${typeCell}
                    <td>${fmtNum(t.buyCount)}</td>
                    <td>${fmtNum(t.total)}</td>
                    <td>${fmtNum(t.won)}</td>
                    <td class="rate-cell ${rateClass(t.rate)}">${pct}</td>
                `;
                statsTbody.appendChild(tr);
            }
            const note = document.getElementById('statsNote');
            if (showType && !hasYi) {
                note.textContent = '💡 数据中无乙组样本，更大投注数（乙组，申购金额 > 500 万）通常必中';
                note.style.display = 'block';
            } else {
                note.style.display = 'none';
            }
            const overall = stats.totalAccounts > 0 ? (stats.totalWins / stats.totalAccounts * 100).toFixed(2) + '%' : '-';
            statsSummary.innerHTML = `
                <span class="summary-item">样本账户数：${fmtNum(stats.totalAccounts)}</span>
                <span class="summary-item">中签账户：${fmtNum(stats.totalWins)}</span>
                <span class="summary-item">中签率：${overall}</span>
            `;
            const now = new Date();
            const pad = n => String(n).padStart(2, '0');
            statsTime.innerHTML = `数据来源：<strong>hk.dcdddd.com</strong> · 生成时间：${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
            resultCard.style.display = 'block';
        }

        async function handleFile(file) {
            setError('');
            setStatus('正在解析文件名…');
            let code = parseCode(file.name);
            if (!code) {
                code = (prompt('未能从文件名识别股票代码，请手动输入（4-5位数字）：') || '').trim();
                if (!code) { setError('未提供股票代码，已取消'); return; }
                code = code.padStart(5, '0');
            }

            setStatus(`正在获取股票名称（${code}）…`);
            let name = await fetchStockName(code);
            if (!name) {
                name = (prompt(`未能自动获取股票名称，请手动输入（${code}）：`) || '').trim();
                if (!name) name = code;
                nameCache.set(code, name);
            }

            setStatus('正在解析 Excel…');
            let rows;
            try {
                rows = await readExcelFile(file);
            } catch (e) {
                setError(e.message);
                return;
            }
            if (!rows || rows.length < 2) {
                setError('Excel 文件没有有效数据');
                return;
            }

            const stats = computeTierStats(rows);
            if (stats.tiers.length === 0) {
                setError('未识别到任何投注数据，请检查文件格式（第3列应为投注数）');
                return;
            }

            setStatus('');
            currentStats = { code, name, stats };
            renderCurrent();
        }

        function renderCurrent() {
            if (!currentStats) return;
            const priceRaw = document.getElementById('issuePrice').value.trim();
            const issuePrice = priceRaw === '' ? null : Number(priceRaw);
            render(currentStats.stats, currentStats.code, currentStats.name, issuePrice);
        }

        document.getElementById('issuePrice').addEventListener('input', renderCurrent);

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (!file) return;
            hidePreview();
            handleFile(file).catch(e => setError('处理出错：' + e.message));
        });

        resetBtn.addEventListener('click', function() {
            fileInput.value = '';
            resultCard.style.display = 'none';
            setStatus('');
            currentStats = null;
            hidePreview();
        });

        let lastPreviewUrl = null;
        function showPreview(blob) {
            if (lastPreviewUrl) URL.revokeObjectURL(lastPreviewUrl);
            lastPreviewUrl = URL.createObjectURL(blob);
            const preview = document.getElementById('imgPreview');
            const img = document.getElementById('imgPreviewImg');
            img.src = lastPreviewUrl;
            preview.style.display = 'block';
        }
        function hidePreview() {
            const preview = document.getElementById('imgPreview');
            preview.style.display = 'none';
            if (lastPreviewUrl) {
                URL.revokeObjectURL(lastPreviewUrl);
                lastPreviewUrl = null;
            }
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function saveImage(blob, filename) {
            const file = new File([blob], filename, { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: `${currentStats.name} 中签率统计`
                    });
                    showPreview(blob);
                    return;
                } catch (e) {
                    if (e.name === 'AbortError') {
                        showPreview(blob);
                        return;
                    }
                    // 其他错误 → 走下载回退
                }
            }
            downloadBlob(blob, filename);
            showPreview(blob);
        }

        downloadImgBtn.addEventListener('click', async function() {
            if (!currentStats) return;
            const el = document.getElementById('exportArea');
            const origText = downloadImgBtn.textContent;
            downloadImgBtn.disabled = true;
            downloadImgBtn.textContent = '生成中...';
            try {
                const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                if (!blob) throw new Error('图片生成为空');
                const filename = `${currentStats.code}_${currentStats.name}_中签率统计.png`;
                await saveImage(blob, filename);
            } catch (e) {
                setError('生成图片失败：' + e.message);
            } finally {
                downloadImgBtn.disabled = false;
                downloadImgBtn.textContent = origText;
            }
        });
    })();
    </script>
</body>
</html>
