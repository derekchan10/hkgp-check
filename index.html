<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中签结果比对工具</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/style.css?v=202605011355">
</head>
<body>
    <div class="container mt-5">
        <div class="text-end">
            <a href="stats.html" class="nav-link-top">📊 中签率统计 →</a>
        </div>
        <h1 class="text-center mb-4">中签结果比对工具</h1>

        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card">
                    <div class="card-body">
                        <form id="matchForm">
                            <div class="mb-3">
                                <label for="accountFile" class="form-label">账号文件（Excel格式，两列：姓名、账号）</label>
                                <input type="file" class="form-control" id="accountFile" accept=".xlsx,.xls" required>
                                <div class="form-text">
                                    请选择Excel格式的账号文件
                                    <a href="account.xlsx" class="ms-2 text-decoration-none">
                                        <i class="bi bi-download"></i> 下载模板文件
                                    </a>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="resultFile" class="form-label">中签结果文件（Excel格式，四列：账号后三位、名字头5个字母，投注数，中签数）</label>
                                <input type="file" class="form-control" id="resultFile" accept=".xlsx,.xls" required>
                                <div class="form-text">请选择Excel格式的中签结果文件</div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">开始比对</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div id="resultSection" class="mt-4" style="display: none;">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">比对结果</h5>
                            <button id="downloadBtn" class="btn btn-success btn-sm" style="display: none;">
                                下载结果
                            </button>
                        </div>
                        <div class="card-body">
                            <!-- 总中签数显示区域 -->
                            <div class="mt-3 p-3 bg-light rounded" id="summarySection" style="display: none;">
                                <div class="d-flex flex-wrap justify-content-center gap-3 text-center">
                                    <div>
                                        <div class="text-muted" style="font-size:12px;">已匹配</div>
                                        <div class="fw-bold text-success fs-5" id="totalMatchesSummary">0</div>
                                    </div>
                                    <div class="vr d-none d-sm-block"></div>
                                    <div>
                                        <div class="text-muted" style="font-size:12px;">未匹配</div>
                                        <div class="fw-bold text-warning fs-5" id="totalUnmatchedSummary">0</div>
                                    </div>
                                    <div class="vr d-none d-sm-block"></div>
                                    <div>
                                        <div class="text-muted" style="font-size:12px;">总中签数</div>
                                        <div class="fw-bold text-success fs-5" id="totalWinCount">0</div>
                                    </div>
                                    <div class="vr d-none d-sm-block"></div>
                                    <div>
                                        <div class="text-muted" style="font-size:12px;">整体中签率</div>
                                        <div class="fw-bold text-primary fs-5" id="totalWinRate">0%</div>
                                    </div>
                                </div>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-striped table-hover">
                                    <thead>
                                        <tr>
                                            <th>姓名</th>
                                            <th>账号</th>
                                            <th>投注数</th>
                                            <th>中签数</th>
                                            <th>状态</th>
                                        </tr>
                                    </thead>
                                    <tbody id="resultTable">
                                        <!-- 结果将在这里动态添加 -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 浮动广告 -->
    <div id="floatAd" class="float-ad">
        <!-- 桌面端 -->
        <div class="float-ad-desktop">
            <div class="float-ad-title-row">
                <span class="float-ad-title">📢 账号托管</span>
                <button class="float-ad-close" onclick="document.getElementById('floatAd').style.display='none'">×</button>
            </div>
            <div style="margin-bottom:4px;">微信：<strong>DC101000</strong></div>
            <button class="copy-btn" onclick="copyWechat()">复制微信号</button>
            <div class="float-ad-sub">加微信请备注来源</div>
            <img src="static/wechat-qr.jpg" alt="微信二维码" style="width:100%;border-radius:6px;margin:6px 0;">
            <hr class="float-ad-hr">
            <div class="float-ad-list">✅ 高胜率认购策略<br>✅ 自动化认购<br>✅ 中签查询<br>✅ 一键卖出</div>
        </div>
        <!-- 手机端 -->
        <div class="float-ad-mobile">
            <div class="float-ad-mobile-header">
                <span>📢 账号托管 · 微信：<strong>DC101000</strong>（备注来源）</span>
                <div style="display:flex;gap:6px;flex-shrink:0;align-items:center;">
                    <button class="copy-btn copy-btn-sm" onclick="copyWechat()">复制微信号</button>
                    <button class="float-ad-close float-ad-close-inline" onclick="document.getElementById('floatAd').style.display='none'">×</button>
                </div>
            </div>
            <div class="float-ad-mobile-body">
                <div class="float-ad-list">✅ 高胜率认购策略 &nbsp;✅ 自动化认购 &nbsp;✅ 中签查询 &nbsp;✅ 一键卖出</div>
            </div>
        </div>
    </div>
    <script>
        function copyWechat() {
            navigator.clipboard.writeText('DC101000').then(function() {
                var btns = document.querySelectorAll('.copy-btn');
                btns.forEach(function(btn) { btn.textContent = '已复制✓'; });
                setTimeout(function() {
                    document.querySelectorAll('.copy-btn').forEach(function(btn) { btn.textContent = '复制微信号'; });
                }, 2000);
            });
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Excel 解析库 -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- 中文转拼音库 -->
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3/dist/index.js"></script>
    <script src="static/script.js"></script>
</body>
</html>
